name: Ollie CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run doctor
      - run: npm run lint
      - run: npm test
      - name: Check for leaked secrets
        run: |
          if grep -r "AIzaSy" www/ api/ server/index.js 2>/dev/null; then
            echo "::error::Possible API key found in source files!"
            exit 1
          fi

  build-android:
    name: Build Android APK (debug + release if signing keys present)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npx cap sync android
      - name: Build debug APK
        run: |
          chmod +x android/gradlew  # belt-and-suspenders; index mode regressed once (abfe077)
          cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Decode release keystore (no-op if secret unset)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ANDROID_KEYSTORE_BASE64 unset — skipping release signing"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/release.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/android/release.jks" >> "$GITHUB_ENV"
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - name: Build signed release APK
        if: steps.keystore.outputs.configured == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease
      - name: Upload signed release APK
        if: steps.keystore.outputs.configured == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS (unsigned, compile-check only)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx cap sync ios
      - name: pod install
        run: cd ios/App && pod install
      - name: Compile (no signing)
        run: |
          cd ios/App
          set -o pipefail
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule')
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm i -g vercel
      - run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Post-deploy health check (verifies git_sha matches)
        run: |
          set -e
          response=$(curl -fsS --retry 2 --retry-delay 5 --retry-all-errors --max-time 40 https://forthechild.vercel.app/api/health)
          echo "$response"
          deployed_sha=$(echo "$response" | sed -nE 's/.*"git_sha":"([^"]+)".*/\1/p')
          echo "Deployed git_sha=$deployed_sha (expected ${GITHUB_SHA:0:8})"
